<html>
    <head>
        <title>Dashboard</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .items a{
        background:white;
        border-color:white;
        border-radius:20px;
    }
    #theme{
        width:150px;

    }
    #summary{
        border-radius:20px;
        border-left:5px solid blue;
    }
    #clock{
        color:white;
        margin-right:200px;
        font-size:20px;
    }
</style>
    </head>
    <body>
        <nav class="navbar bg-primary">
            <span class="navbar-brand ms-5">☁️ Sky Cast</span>
            <div id="clock"></div>
            <div class="items d-flex gap-4">
            <a href="history.html" class="btn btn-white">History</a>
             <a href="about.html" class="btn btn-white">About</a>
             <select id="theme" class="form-control" onchange="themechange(this.value)">
                <option value="" disabled selected>Select Theme</option>
                <option value="dark">Dark</option>
                  <option value="light">Light</option>
                    <option value="green">Green</option>
                      <option value="blue">Blue</option>
                
             </select>
              <a href="login.html" class="btn btn-white me-3">Logout</a>
             </div> 
        </nav>
        <div class="container">
            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card p-3 shadow" id="summary">
                        <h3 class="text-primary">Location</h3>
                        <p>Enter a city name to get started.</p>
                        <input type="text" id="city" placeholder="Enter city" class="form-control mt-4">
                        <button onclick="check()" class="btn btn-primary mt-4">Check Weather</button>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card p-5 text-center">
                         <h3 id="loading"></h3>
                        <h3 id="location"></h3>
                        <h3 id="weathericon"></h3>
                        <h3 id="temperature"></h3>
                        <h5 id="name"></h5>
                        <p id="wind"></p>
                        <p id="time"></p>
                    </div>
                </div>
            </div>
        </div>
        <script>
            async function check() {
                console.log("check button clicked");
                let city = document.getElementById("city").value;
                if(city == ""){
                    alert("Enter the cityname");
                    return;
                }
                document.getElementById("loading").innerHTML = "Loading Weather...";
                fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + city)
.then(response => response.json())
.then(data => {
let lat = data.results[0].latitude;
let lon = data.results[0].longitude;
let place = data.results[0].name;
let weatherapi = "https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current_weather=true";
fetch(weatherapi)
.then(response => response.json())
.then(async data => {
    document.getElementById("loading").innerHTML = "";
let temp = data.current_weather.temperature;
let wind = data.current_weather.windspeed;
let time = data.current_weather.time;

document.getElementById("location").innerHTML = place;
document.getElementById("temperature").innerHTML = temp + " °C";
document.getElementById("wind").innerHTML = "WindSpeed: "  + wind + "km/h";
document.getElementById("time").innerHTML = "Last Updated: " + time;
let imgurl = "";
let weathername = "";
if(temp >=30){
document.getElementById("weathericon").innerHTML = `
<img src="https://cdn-icons-png.flaticon.com/512/869/869869.png" width="70">`;
document.getElementById("temperature").style.color = "red";
weathername = "Sunny Weather";
imgurl = "https://cdn-icons-png.flaticon.com/512/869/869869.png";
document.getElementById("name").innerHTML = weathername;
document.body.style.backgroundColor = "#FF8081";

}
else if(temp >= 20){
document.getElementById("weathericon").innerHTML = `
<img src ="https://cdn-icons-png.flaticon.com/512/414/414825.png" height="150">`;
document.getElementById("temperature").style.color = "orange";
weathername = "Pleasant Weather";
imgurl = "https://cdn-icons-png.flaticon.com/512/414/414825.png";
document.getElementById("name").innerHTML = weathername;
document.body.style.backgroundColor = "orange";

}
else if(temp >= 15){
document.getElementById("weathericon").innerHTML = `
<img src="https://cdn-icons-png.flaticon.com/512/1163/1163624.png" height="150">`;
document.getElementById("temperature").style.color = "blue";
weathername = "Rainy Weather";
imgurl  = "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";
document.getElementById("name").innerHTML = weathername;
document.body.style.backgroundColor = "#e6f3ff";

}
else{
document.getElementById("weathericon").innerHTML = `
<img src="https://cdn-icons-png.flaticon.com/512/172/172922.png" height="150">`;
document.getElementById("temperature").style.color = "blue";
weathername = "Cool Weather";
imgurl  = "https://cdn-icons-png.flaticon.com/512/172/172922.png";
document.getElementById("name").innerHTML = weathername;
document.body.style.backgroundColor = "#e6f3ff";

}
await fetch(
`http://localhost:8080/check?city=${encodeURIComponent(city)}
&location=${encodeURIComponent(place)}
&temperature=${temp}
&name=${encodeURIComponent(weathername)}
&wind=${wind}
&time=${encodeURIComponent(time)}
&imgurl=${encodeURIComponent(imgurl)}`
);

document.getElementById("city").value = ""; 
console.log(city);
console.log(place);
console.log(temp);

});
});
                
            }
            function themechange(theme){
if(theme=="light"){
document.body.style.backgroundColor = "white";
document.getElementById("summary").style.backgroundColor = "white";
document.getElementById("cards").style.backgroundColor = "white";
document.getElementById("place").style.color = "black";
}
else if (theme=="dark"){
document.body.style.backgroundColor = "#1E293B";
document.getElementById("summary").style.backgroundColor = "grey";
document.getElementById("cards").style.backgroundColor = "grey";
document.getElementById("place").style.color = "white";
document.getElementById("wind").style.color = "white";
document.getElementById("time").style.color = "white";
}
else if(theme=="blue"){
document.body.style.backgroundColor = "#E0F2FE";
document.getElementById("summary").style.backgroundColor = "#E0F2FE";
document.getElementById("cards").style.backgroundColor = "#E0F2FE";
document.getElementById("place").style.color = "black";
}
else if(theme=="green"){
document.body.style.backgroundColor = "#F0FDF4";
document.getElementById("summary").style.backgroundColor = "#F0FDF4";
document.getElementById("cards").style.backgroundColor = "#F0FDF4";
document.getElementById("place").style.color = "black";
}
}
function updateclock(){
    let now = new Date;
    let date = now.toLocaleDateString();
    let time = now.toLocaleTimeString();
    document.getElementById("clock").innerHTML = date + " | " + time;
}
setInterval(updateclock,1000);
updateclock();
        </script>
    </body>
</html>
