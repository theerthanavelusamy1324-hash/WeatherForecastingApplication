<html>
    <head>
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{
        background:linear-gradient(to right,#D8EFFD,#88D6FC);
    }
    .card{
        width:350px;
        margin-left:400px;
        border-radius:20px;
        margin-top:80px;
        background:#DAF2FE;
    }
    h3{
        color:#05689E;
    }
    img{
      margin-left:90px;
    }
</style>
    </head>
    <body>
        <div class="container">
            <div class="card p-5 text-center shadow">
                <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png" width="70">
                <h3>Sky View Login</h3>
                <input type="email" id="mail" placeholder="Enter Email" class="form-control mt-3">
                <input type="password" id="password" placeholder="Enter Password" class="form-control mt-3">
                <button onclick="login()" class="btn btn-primary mt-4">Login</button>
                <p class="mt-3">New User?<span onclick="create()" class="text-primary">Create Account</span></p>

            </div>
        </div>
        <script>
            async function login() {
                let email = document.getElementById("mail").value;
                let password = document.getElementById("password").value;
            let response = await fetch(`http://localhost:8080/login?email=${email}&password=${password}`,
                {
                    method:"POST"
                }
            );
            let data = await response.text();
            if(data =="success"){
                window.location.href = "dashboard.html";
            }
            else{
                alert("Invalid mail or password");
            }
                
            }
            function create(){
                window.location.href = "signup.html";
            }
        </script>
    </body>
</html>
