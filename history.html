<html>
    <head>
        <title>History</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
    <body>
        <div class="container mt-5">
           <h3 class="text-primary text-center">Search History</h3>
           <table class="table table-bordered mt-3">
            <thead class="table-primary">
                <tr>
                <th>City</th>
                <th>Temperature</th>
                <th>Wind</th>
                <th>Time</th>
                <th>Image</th>
                </tr>
            </thead>
            <tbody id="tablebody"></tbody>
           </table>
           <a href="dashboard.html" class="btn btn-dark">Back</a>
        </div>
        <script>
            async function history() {
            let response = await fetch(`http://localhost:8080/history`);
            let data = await response.json();
            let row = "";
            console.log(data);
            for(let t of data){
                row+=`
                <tr>
                    <td>${t.location}</td>
                    <td>${t.temperature}</td>
                    <td>${t.wind}</td>
                    <td>${t.time}</td>
                     <td><img src="${t.imgurl}" width="60" height="50"></td>
                    </tr>
                    `;
            }
            document.getElementById("tablebody").innerHTML = row;
                
            }
            history();
        </script>
    </body>
</html>
